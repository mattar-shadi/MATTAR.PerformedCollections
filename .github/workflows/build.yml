name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MATTAR.PerformanceCollections.slnx

      - name: Build
        run: dotnet build MATTAR.PerformanceCollections.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/MATTAR.PerformanceCollections.Tests/MATTAR.PerformanceCollections.Tests.csproj --no-restore --configuration Release --logger "console;verbosity=normal"
